name: crio_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0        # Leaflet equivalent
  latlong2: ^0.9.0           # Map coordinates
  http: ^1.2.0               # API calls
  get: ^4.7.3                # State management
  shared_preferences: ^2.2.0 # Demo mode toggle storage
  timeline_tile: ^2.0.0      # AgentTrace timeline
  fl_chart: ^0.68.0          # Charts & severity visualizations
  shimmer: ^3.0.0            # Loading skeletons
  lottie: ^3.1.2             # Emergency alert animations
  animated_text_kit: ^4.2.2  # Live signal typing animation
  google_fonts: ^6.2.1       # Premium modern typography
  flutter_animate: ^4.5.0    # High-end entry animations
  dio: ^5.9.2
  pdf: ^3.12.0
  cached_network_image: ^3.4.1
  webview_flutter: ^4.13.1
  share_plus: ^13.1.0
  path_provider: ^2.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - assets/mock/
    - assets/images/
    - assets/ngl_viewer.html
    
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

